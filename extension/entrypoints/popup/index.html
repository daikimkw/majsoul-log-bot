<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>成績記録の設定</title>
    <style>
      body { font-family: "Hiragino Sans", sans-serif; width: 320px; padding: 12px; }
      label { display: block; margin-bottom: 10px; font-size: 13px; }
      input { width: 100%; box-sizing: border-box; padding: 6px 8px; margin-top: 4px; }
      button { padding: 6px 16px; }
      #status { margin-left: 8px; color: #1a7f37; font-size: 13px; }
    </style>
  </head>
  <body>
    <h3>成績記録の設定</h3>
    <label>
      サーバーURL
      <input id="endpoint" placeholder="https://majsoul-log-bot.xxx.workers.dev" />
    </label>
    <label>
      APIキー
      <input id="apiKey" type="password" />
    </label>
    <button id="save">保存</button><span id="status"></span>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
